name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar PyInstaller
        run: pip install pyinstaller==6.5.0

      - name: Build .exe
        run: pyinstaller editor_globo.spec

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: Editor-Video-OGlobo-Windows
          path: dist\Editor-Video-OGlobo.exe
          retention-days: 30

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Editor de Vídeo O Globo — Build ${{ github.run_number }}"
          body: |
            Baixe o `.exe` abaixo e dê duplo clique. Não precisa instalar nada.
            Requisitos: Windows 10/11, Chrome ou Edge.
          files: dist\Editor-Video-OGlobo.exe
